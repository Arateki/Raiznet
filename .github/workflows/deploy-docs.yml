name: Deploy Raiznet Docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/home-server/websites/raiznet/docs/dist

jobs:
  deploy-docs:
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @raiznet/docs build

      - name: Deploy docs
        run: |
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete docs/.vitepress/dist/ "$DEPLOY_DIR/"
