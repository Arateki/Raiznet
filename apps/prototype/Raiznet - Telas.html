<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Raiznet — Telas</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; color: #1d231e; font-family: 'Montserrat', sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="glyphs.jsx"></script>
<script type="text/babel" src="screens-esp.jsx"></script>
<script type="text/babel" src="screens-server-1.jsx"></script>
<script type="text/babel" src="screens-server-2.jsx"></script>
<script type="text/babel" src="screens-server-3.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "greenIdx": 0,
  "theme": "dark",
  "displayFont": "Fraunces"
}/*EDITMODE-END*/;

const GREENS = [
  { name: 'Forest (mata)', val: '#1a3a28', label: 'sóbrio · padrão' },
  { name: 'Leaf (folha)', val: '#3a7d44', label: 'vivo · brand' },
  { name: 'Sage (sálvia)', val: '#84a98c', label: 'aquarela · suave' },
  { name: 'Tech (cyber)', val: '#65d46e', label: 'terminal · neon' },
];
const FONTS = ['Cormorant Garamond', 'Lora', 'Fraunces', 'Playfair Display', 'EB Garamond'];

function App() {
  const [tw, setTw] = useTweaks(TWEAKS);

  // Apply theme + greens
  React.useEffect(() => {
    const r = document.documentElement;
    r.setAttribute('data-theme', tw.theme);
    r.style.setProperty('--primary', GREENS[tw.greenIdx].val);
    r.style.setProperty('--primary-soft', `color-mix(in oklab, ${GREENS[tw.greenIdx].val} 18%, transparent)`);
    r.style.setProperty('--primary-line', `color-mix(in oklab, ${GREENS[tw.greenIdx].val} 35%, transparent)`);
    r.style.setProperty('--f-serif', `"${tw.displayFont}", "Lora", Georgia, serif`);
  }, [tw.greenIdx, tw.theme, tw.displayFont]);

  // Inject Google font dynamically when display font changes
  React.useEffect(() => {
    if (!tw.displayFont) return;
    const id = 'gf-display';
    let l = document.getElementById(id);
    if (!l) { l = document.createElement('link'); l.id = id; l.rel = 'stylesheet'; document.head.appendChild(l); }
    const fam = tw.displayFont.replace(/ /g, '+');
    l.href = `https://fonts.googleapis.com/css2?family=${fam}:ital,wght@0,400;0,500;1,400;1,500&display=swap`;
  }, [tw.displayFont]);

  return (
    <>
      <DesignCanvas>
        {/* ESP32 captive portal mobile */}
        <DCSection id="esp-captive" title="ESP32 — Captive Portal (mobile)" subtitle="Setup local do nó folha. Mostrado a alguns metros do dispositivo, apontando o celular para a rede 'safrasense-XXXX' aberta.">
          <DCArtboard id="esp-1" label="01 · Boas-vindas + seed" width={390} height={760}><ESPCaptiveSeed/></DCArtboard>
          <DCArtboard id="esp-2" label="02 · Wi-Fi & swarm"   width={390} height={760}><ESPCaptiveWifi/></DCArtboard>
          <DCArtboard id="esp-3" label="03 · Servidores conhecidos" width={390} height={760}><ESPCaptiveServers/></DCArtboard>
          <DCArtboard id="esp-4" label="04 · Dashboard local"  width={390} height={760}><ESPDashboard/></DCArtboard>
          <DCArtboard id="esp-5" label="05 · Privacidade por campo" width={390} height={760}><ESPPrivacy/></DCArtboard>
        </DCSection>

        {/* Server onboarding */}
        <DCSection id="srv-onb" title="Servidor — Onboarding" subtitle="Primeira execução. O usuário gera a identidade, escolhe modo do nó, ingressa em redes.">
          <DCArtboard id="srv-onb-1" label="01 · Seed phrase"  width={1280} height={800}><ServerOnboardSeed/></DCArtboard>
          <DCArtboard id="srv-onb-2" label="02 · Modo + redes" width={1280} height={800}><ServerOnboardMode/></DCArtboard>
        </DCSection>

        {/* Server dashboard variants */}
        <DCSection id="srv-dash" title="Servidor — Visão Geral" subtitle="Duas variações: editorial (botânica/aquarela, type-led) e terminal (densa, mono, dark-friendly).">
          <DCArtboard id="srv-dash-a" label="A · Editorial" width={1440} height={900}><ServerDashA/></DCArtboard>
          <DCArtboard id="srv-dash-b" label="B · Terminal"  width={1440} height={900}><ServerDashB/></DCArtboard>
        </DCSection>

        {/* Server map */}
        <DCSection id="srv-map" title="Servidor — Mapa H3" subtitle="Granularidade por célula H3 (res 5/7/9/11). Choropleth por métrica selecionável.">
          <DCArtboard id="srv-map-a" label="A · Colmeia editorial" width={1440} height={900}><ServerMapA/></DCArtboard>
          <DCArtboard id="srv-map-b" label="B · Heatmap densidade" width={1440} height={900}><ServerMapB/></DCArtboard>
        </DCSection>

        {/* Server device */}
        <DCSection id="srv-dev" title="Servidor — Dispositivo individual" subtitle="Telemetria, safra ativa, política de privacidade por campo.">
          <DCArtboard id="srv-dev-a" label="A · Editorial" width={1440} height={900}><ServerDeviceA/></DCArtboard>
          <DCArtboard id="srv-dev-b" label="B · Terminal"  width={1440} height={900}><ServerDeviceB/></DCArtboard>
          <DCArtboard id="srv-dev-c" label="Provisionamento (DeviceClaim)" width={1440} height={900}><ServerProvision/></DCArtboard>
        </DCSection>

        {/* Server other */}
        <DCSection id="srv-misc" title="Servidor — Cultivos, Filtros, Materiais, Configurações">
          <DCArtboard id="srv-crops"   label="Cultivos / CropProfiles"   width={1440} height={900}><ServerCrops/></DCArtboard>
          <DCArtboard id="srv-filters" label="Filtros (set algebra)"     width={1440} height={900}><ServerFilters/></DCArtboard>
          <DCArtboard id="srv-mats"    label="Materiais educativos"      width={1440} height={900}><ServerMaterials/></DCArtboard>
          <DCArtboard id="srv-set"     label="Configurações / chaves"    width={1440} height={900}><ServerSettings/></DCArtboard>
        </DCSection>

        {/* Mobile — server */}
        <DCSection id="srv-mob" title="Servidor — Mobile" subtitle="Versão reduzida do servidor, para acompanhar a rede pelo celular.">
          <DCArtboard id="srv-mob-1" label="Visão geral mobile" width={390} height={760}><ServerMobileDash/></DCArtboard>
          <DCArtboard id="srv-mob-2" label="Mapa mobile"        width={390} height={760}><ServerMobileMap/></DCArtboard>
          <DCArtboard id="srv-mob-3" label="Dispositivo mobile" width={390} height={760}><ServerMobileDevice/></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks" defaultOpen={false}>
        <TweakSection title="Cor primária">
          <TweakRadio
            label="Verde"
            value={tw.greenIdx}
            onChange={(v) => setTw('greenIdx', v)}
            options={GREENS.map((g, i) => ({ value: i, label: g.name }))}
          />
          <div style={{ display: 'flex', gap: 6, padding: '8px 14px 4px' }}>
            {GREENS.map((g, i) => (
              <div key={i} onClick={() => setTw('greenIdx', i)} style={{
                flex: 1, height: 28, background: g.val, cursor: 'pointer',
                outline: i === tw.greenIdx ? '2px solid #c96442' : 'none',
                outlineOffset: 1,
              }}/>
            ))}
          </div>
        </TweakSection>
        <TweakSection title="Tema">
          <TweakRadio
            label="Modo"
            value={tw.theme}
            onChange={(v) => setTw('theme', v)}
            options={[
              { value: 'light', label: 'Aquarela (light)' },
              { value: 'dark',  label: 'Terminal (dark)'  },
            ]}
          />
        </TweakSection>
        <TweakSection title="Tipografia display (serif)">
          <TweakSelect
            label="Família"
            value={tw.displayFont}
            onChange={(v) => setTw('displayFont', v)}
            options={FONTS.map(f => ({ value: f, label: f }))}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
